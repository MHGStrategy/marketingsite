<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MHG Strategy — Facebook Cover</title>
  <style>
    /* Built from site tokens: globals.css + Navigation.tsx + HomePageDefault hero */
    :root {
      --primary-blue: #239bf6;
      --primary-black: #000000;
      --primary-white: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1702px;
      height: 630px;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .cover {
      position: relative;
      width: 1702px;
      height: 630px;
      overflow: hidden;
    }

    .hero {
      position: absolute;
      inset: 0;
      background: #000 center / cover no-repeat
        url("../../public/uploads/mhgstrategyhero.png");
    }

    /* Light shade only — hero asset is already dark (matches live site look) */
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.28);
    }

    /* Navigation.tsx: sticky top-0 z-50 bg-black; inner md:h-24 */
    .nav {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 30;
      height: 96px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.25);
    }

    /*
      Site uses <img class="md:h-24"> of mhg-logo.png.
      That PNG has heavy black padding; blue wordmark fills ~70% of the box.
      SVG below matches public/mhg-logo.svg color + stacked layout at that visual size.
    */
    .logo {
      width: 148px;
      height: auto;
      display: block;
    }

    /* Directly under logo / black bar — not vertically centered in hero */
    .tagline-wrap {
      position: absolute;
      z-index: 20;
      left: 15%;
      right: 15%;
      top: 96px;
      display: flex;
      justify-content: center;
      padding-top: 28px;
    }

    .tagline {
      color: #fff;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.06em;
      line-height: 1.3;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.55);
    }
  </style>
</head>
<body>
  <div class="cover" id="cover">
    <div class="hero" aria-hidden="true"></div>

    <header class="nav">
      <svg class="logo" viewBox="70 120 1060 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MHG Strategy">
        <!-- Cropped from public/mhg-logo.svg proportions; brand blue #239BF6 -->
        <g fill="#239BF6" font-family="Arial, Helvetica, sans-serif" font-weight="700">
          <text x="600" y="310" font-size="300" text-anchor="middle" letter-spacing="6">MHG</text>
          <text x="600" y="470" font-size="128" text-anchor="middle" letter-spacing="16">STRATEGY</text>
        </g>
      </svg>
    </header>

    <div class="tagline-wrap">
      <p class="tagline">AI-Powered Ops</p>
    </div>
  </div>
</body>
</html>
